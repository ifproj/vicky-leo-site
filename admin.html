<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Edit — Vicky Leo</title>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/admin.css">
  <script src="content.js"></script>
</head>
<body>
  <div id="gate" class="gate">
    <form id="gate-form" class="gate__form">
      <h1>Edit site content</h1>
      <p class="gate__note">Enter the admin passphrase. This is a light gate, not a security boundary (see README).</p>
      <input id="gate-input" type="password" placeholder="Passphrase" autocomplete="current-password" required>
      <button type="submit">Unlock</button>
      <p id="gate-error" class="gate__error" hidden>Incorrect passphrase.</p>
    </form>
  </div>

  <main id="editor" class="editor" hidden>
    <header class="editor__bar">
      <strong>Editing content</strong>
      <div class="editor__actions">
        <button id="btn-save" type="button">Save draft</button>
        <a id="btn-preview" href="index.html" target="_blank">Preview</a>
        <button id="btn-export" type="button">Export content.js</button>
        <label class="btn-import">Import<input id="file-import" type="file" accept=".js,.json" hidden></label>
        <button id="btn-reset" type="button" class="danger">Reset to published</button>
      </div>
      <p id="status" class="editor__status" role="status"></p>
    </header>
    <form id="fields" class="editor__fields"></form>
    <p class="editor__publish">To publish to everyone: Export, then replace <code>content.js</code> on the host.</p>
  </main>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/render.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
